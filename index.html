  <style>
    :root {
      --paper: #f7f0e6;
      --paper-strong: #fffaf3;
      --mist: #efe2d2;
      --ink: #16120f;
      --ink-soft: #5a4f45;
      --line: rgba(73, 52, 34, 0.14);
      --line-strong: rgba(73, 52, 34, 0.22);
      --forest: #183a33;
      --forest-soft: #29544b;
      --copper: #a65c2e;
      --copper-deep: #84461f;
      --blue: #295ea8;
      --quote: rgba(255, 251, 244, 0.86);
      --shadow: 0 22px 60px rgba(44, 29, 17, 0.1);
      --shadow-soft: 0 14px 34px rgba(44, 29, 17, 0.08);
      --serif: "Fraunces", ui-serif, Georgia, serif;
      --sans: "Manrope", ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(24, 58, 51, 0.1), transparent 30%),
        radial-gradient(circle at 85% 14%, rgba(166, 92, 46, 0.12), transparent 22%),
        linear-gradient(180deg, #f8f1e7 0%, #f4eadc 100%);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(73, 52, 34, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(73, 52, 34, 0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 100%);
      opacity: 0.35;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; text-underline-offset: 3px; }

    .page {
      position: relative;
      z-index: 1;
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 60px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      margin: 0 0 32px;
      backdrop-filter: blur(20px) saturate(150%);
      background: rgba(248, 241, 231, 0.82);
      border: 1px solid rgba(73, 52, 34, 0.1);
      border-radius: 999px;
      box-shadow: 0 14px 40px rgba(44, 29, 17, 0.08);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 10px 24px rgba(24, 58, 51, 0.12);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-name {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--forest);
    }

    .brand-role {
      margin: 2px 0 0;
      color: var(--ink-soft);
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      justify-content: flex-end;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .nav a {
      color: var(--ink-soft);
      font-weight: 700;
      padding: 4px 0;
    }

    .nav a:hover {
      color: var(--forest);
    }

    .nav-cta {
      color: var(--ink-soft) !important;
      font-weight: 700;
      padding: 4px 0;
      background: transparent;
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 28px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-copy,
    .hero-side {
      border-radius: 38px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      min-height: 572px;
      padding: 38px 36px 34px;
      background: linear-gradient(180deg, rgba(255, 251, 244, 0.94) 0%, rgba(253, 247, 239, 0.8) 100%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(24, 58, 51, 0.08);
      color: var(--forest);
      border: 1px solid rgba(24, 58, 51, 0.12);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .hero h1,
    .section-title,
    .spotlight-title,
    .role-title,
    .quote-copy {
      font-family: var(--serif);
      letter-spacing: -0.04em;
    }

    .hero h1 {
      margin: 14px 0 12px;
      max-width: 10ch;
      font-size: clamp(1.85rem, 3.4vw, 2.5rem);
      line-height: 1.04;
      color: var(--ink);
      text-wrap: balance;
    }

    .hero-lede {
      max-width: 62ch;
      font-size: 0.98rem;
      line-height: 1.7;
      color: var(--ink-soft);
      margin: 0 0 16px;
    }

    .hero-proof {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin: 0 0 28px;
      max-width: none;
    }

    .proof-pill {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 104px;
      padding: 16px 20px;
      border-radius: 20px;
      background: rgba(255, 251, 244, 0.78);
      border: 1px solid rgba(73, 52, 34, 0.11);
      color: var(--forest);
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }

    .hero-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: auto;
      padding-top: 18px;
    }

    .button,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 126px;
      padding: 0 32px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
    }

    .button {
      background: linear-gradient(135deg, var(--forest) 0%, var(--forest-soft) 100%);
      color: #fdf8f0;
      box-shadow: 0 14px 32px rgba(24, 58, 51, 0.22);
    }

    .button-secondary {
      background: rgba(255, 251, 244, 0.78);
      color: var(--ink);
      border-color: rgba(73, 52, 34, 0.14);
      box-shadow: var(--shadow-soft);
    }

    .button:hover,
    .button-secondary:hover,
    .nav-cta:hover {
      transform: translateY(-2px);
      text-decoration: none;
    }

    .hero-side {
      display: grid;
      grid-template-rows: auto 1fr;
      background: linear-gradient(180deg, rgba(24, 58, 51, 0.96) 0%, rgba(31, 73, 64, 0.96) 100%);
      color: #f8efe3;
      min-height: 572px;
    }

    .portrait-wrap {
      padding: 18px 18px 0;
      display: flex;
      justify-content: center;
    }

    .portrait {
      display: block;
      width: 250px;
      height: 250px;
      max-width: 250px;
      margin: 0 auto;
      border-radius: 22px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: center 12%;
      box-shadow: 0 10px 20px rgba(11, 24, 20, 0.16);
      border: 4px solid rgba(255, 255, 255, 0.08);
    }

    .hero-meta {
      padding: 16px 18px 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .meta-head {
      display: grid;
      gap: 4px;
    }

    .meta-head strong {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .meta-head span,
    .meta-list,
    .meta-list a {
      color: rgba(248, 239, 227, 0.78);
      font-size: 0.88rem;
    }

    .meta-list {
      display: grid;
      gap: 10px;
    }

    .meta-row {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meta-row strong {
      display: block;
      margin-bottom: 5px;
      font-size: 1.15rem;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #f8efe3;
    }

    .meta-row span {
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.72rem;
      font-weight: 800;
      color: rgba(248, 239, 227, 0.58);
    }

    .section {
      padding-top: 28px;
    }

    .section-header {
      display: grid;
      gap: 10px;
      margin: 0 0 18px;
    }

    .section-kicker {
      color: var(--copper);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.65rem, 3vw, 2.35rem);
      line-height: 1.02;
      color: var(--ink);
    }

    .section-copy {
      margin: 0;
      max-width: 72ch;
      font-size: 0.94rem;
      line-height: 1.65;
      color: var(--ink-soft);
    }

    .feature-panel {
      margin-top: 22px;
      padding: 24px;
      background: rgba(255, 251, 244, 0.84);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow-soft);
    }

    .feature-panel .section-header {
      margin-bottom: 16px;
    }

    .feature-panel .section-title {
      max-width: none;
      font-size: clamp(1.08rem, 1.35vw, 1.55rem);
      line-height: 1.08;
      letter-spacing: -0.025em;
      text-wrap: balance;
    }

    .embed-wrap {
      display: flex;
      justify-content: center;
    }

    .embed-frame {
      width: 100%;
      max-width: 624px;
      height: 351px;
      border: 0;
      border-radius: 12px;
      box-shadow: 0 14px 32px rgba(44, 29, 17, 0.12);
    }

    .metrics-band {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .metric {
      background: rgba(255, 251, 244, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px 18px 18px;
      box-shadow: var(--shadow-soft);
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .metric-primary {
      background: linear-gradient(135deg, rgba(24, 58, 51, 0.96) 0%, rgba(31, 73, 64, 0.96) 100%);
      color: #f8efe3;
      border-color: rgba(24, 58, 51, 0.2);
    }

    .metric-value {
      display: block;
      margin-bottom: 6px;
      font-size: clamp(1.55rem, 3vw, 2.2rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .metric-label {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.52;
      color: inherit;
      opacity: 0.88;
    }

    .spotlight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
    }

    .spotlight-column {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .spotlight-wide {
      grid-column: 1 / -1;
    }

    .spotlight-card {
      background: rgba(255, 251, 244, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }

    .spotlight-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(24, 58, 51, 0.08);
      color: var(--forest);
      font-size: 0.76rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .spotlight-title {
      margin: 14px 0 10px;
      font-size: 1.5rem;
      line-height: 1.05;
      color: var(--ink);
    }

    .spotlight-copy {
      margin: 0 0 14px;
      color: var(--ink-soft);
      line-height: 1.65;
      font-size: 0.94rem;
    }

    .spotlight-list {
      margin: 0;
      padding-left: 18px;
      color: var(--ink);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .spotlight-list li + li {
      margin-top: 8px;
    }

    .role-grid {
      display: grid;
      gap: 16px;
    }

    .role-card {
      background: rgba(255, 251, 244, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }

    .role-head {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .role-title {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.08;
      color: var(--ink);
    }

    .role-meta {
      color: var(--ink-soft);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .role-list {
      margin: 0;
      padding-left: 18px;
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .role-list li + li {
      margin-top: 8px;
    }

    .quote-grid {
      display: grid;
      grid-template-columns: 1.15fr 1fr 1fr;
      gap: 14px;
    }


    .quote-card {
      background: var(--quote);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }

    .quote-card.featured {
      background: linear-gradient(180deg, rgba(255, 251, 244, 0.96) 0%, rgba(247, 238, 226, 0.92) 100%);
      border-color: rgba(166, 92, 46, 0.2);
    }

    .quote-copy {
      margin: 0 0 16px;
      font-size: 1.15rem;
      line-height: 1.38;
      color: var(--ink);
    }

    .quote-meta {
      color: var(--ink-soft);
      font-size: 0.84rem;
      line-height: 1.5;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 0.92fr;
      gap: 18px;
    }

    .card {
      background: rgba(255, 251, 244, 0.88);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      box-shadow: var(--shadow-soft);
    }

    .card h3 {
      margin: 0 0 10px;
      font-family: var(--serif);
      font-size: 1.35rem;
      line-height: 1.08;
      color: var(--ink);
      letter-spacing: -0.04em;
    }

    .card p {
      margin: 0 0 12px;
      color: var(--ink-soft);
      line-height: 1.65;
      font-size: 0.94rem;
    }

    .stack-list {
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .stack-group {
      display: grid;
      gap: 10px;
    }

    .stack-label {
      margin: 0;
      color: var(--ink-soft);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stack-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      min-height: 48px;
      border-radius: 16px;
      background: rgba(166, 92, 46, 0.08);
      color: var(--ink);
      border: 1px solid rgba(166, 92, 46, 0.16);
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
    }

    .chip.tool {
      background: rgba(24, 58, 51, 0.08);
      border-color: rgba(24, 58, 51, 0.16);
    }

    .cta {
      display: grid;
      grid-template-columns: 1.1fr auto;
      gap: 18px;
      align-items: center;
      margin-top: 10px;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(135deg, #132b26 0%, #21453d 100%);
      color: #f8efe3;
      box-shadow: var(--shadow);
    }

    .cta h3 {
      margin: 0 0 8px;
      font-family: var(--serif);
      font-size: clamp(1.5rem, 3vw, 2.15rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .cta p {
      margin: 0;
      max-width: 56ch;
      color: rgba(248, 239, 227, 0.82);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    .cta-actions {
      display: grid;
      gap: 12px;
      min-width: 240px;
    }

    .cta .button-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #fdf7ee;
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: none;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 34px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 0.86rem;
    }

    @media (max-width: 1100px) {
      .hero,
      .spotlight-grid,
      .split,
      .quote-grid,
      .metrics-band,
      .cta {
        grid-template-columns: 1fr;
      }

      .metrics-band {
        grid-template-columns: repeat(2, 1fr);
      }

      .metric-primary {
        grid-column: 1 / -1;
      }

      .cta-actions {
        min-width: 0;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(var(--max), calc(100% - 20px));
        padding-top: 14px;
      }

      .topbar {
        border-radius: 28px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .nav {
        justify-content: flex-start;
      }

      .hero-copy,
      .hero-side,
      .spotlight-card,
      .role-card,
      .quote-card,
      .card,
      .cta {
        border-radius: 24px;
      }

      .hero-copy,
      .hero-meta,
      .spotlight-card,
      .role-card,
      .quote-card,
      .card,
      .cta {
        padding: 20px 18px;
      }

      .hero h1 {
        max-width: none;
        font-size: clamp(1.6rem, 7vw, 2.1rem);
      }

      .hero-proof,
      .spotlight-grid,
      .spotlight-column,
      .stack-row {
        grid-template-columns: 1fr;
      }

      .embed-frame {
        height: 260px;
      }

      .feature-panel .section-title {
        text-wrap: balance;
      }

      .portrait {
        width: 180px;
        height: 180px;
        max-width: 180px;
      }

      .hero-actions,
      .cta-actions {
        grid-template-columns: 1fr;
      }

      .button,
      .button-secondary,
      .nav-cta {
        width: 100%;
      }

      .metrics-band {
        grid-template-columns: 1fr;
      }
    }
